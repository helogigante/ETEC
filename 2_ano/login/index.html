<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Login</title>
    <link rel="icon" type="image/png" href="image/icon.png"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="http://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/login.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-4">
                <img src="image/login2.png" alt="">
            </div>

            <div class="col-sm-8">
                <h2>Login</h2>

                <form class="login">
                    <div class="mb-3 mt-3">
                        <label for="name">Usuário:</label>
                        <input type="name" class="form-control" id="usuario" placeholder="user" name="usuario">
                    </div>

                    <div class="mb-3">
                        <label for="pwd">Senha:</label>
                        <input type="password" class="form-control" id="senha" placeholder="password" name="senha">
                    </div>

                    <button type="button" class="btn btn-primary" onclick="login()">Acesso</button>
                    
                    <div class="cadastro" style="margin-top: 2%;">
                        <a class="acesso" href="cadastro.html">Cadastre-se</a>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
