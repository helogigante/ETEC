<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Cadastro</title>
    <link rel="icon" type="image/png" href="image/icon.png"/>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/cadastro.css">
    <script src="js/funcao.js"></script>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-4">
                <img src="image/login.png" alt="">
            </div>
        <div class="col-sm-8">
            <h2>Cadastre-se</h2>
            <form class="login">
                <div class="mb-3 mt-3">
                    <label for="name">Nome de Usuário:</label>
                    <input type="text" class="form-control" id="usuario" placeholder="user">
                </div>
                <div class="mb-3 mt-3">
                    <label for="email">E-mail:</label>
                    <input type="text" class="form-control" id="email" placeholder="email">
                </div>
                <div class="mb-3">
                    <label for="pwd">Senha:</label>
                    <input type="password" class="form-control" id="senha" placeholder="senha">
                </div>
                <div class="mb-3">
                    <label for="pwd">Confirme a senha:</label>
                    <input type="password" class="form-control" id="confirma" placeholder="senha">
                </div>
                <button type="submit" class="btn btn-primary" onclick="inclui()">Criar Conta</button>
            </form>

        </div>
    </div>
  
</body>
</html>
