<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Busca CEP</title>
    <link rel="icon" type="image/png" href="img/icon.png"/>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/footer.css">
    <script src="js/funcao.js"></script>

</head>
<body>

    <br>

    <img src="./img/brasil.png" alt="" style="width: 5%; margin-left: 20px;" onclick="idioma(1)">
    <img src="./img/eua.png" type="button" style="width: 5%;" onclick="idioma(2)">

    <div class="row">
        <div class="coluna1">
            <img src="./img/childe.gif" alt="" style="width: 20%; margin-left: 20px; margin-top: 15px;">
        </div>

        <div class="coluna2">
            <div class="quadrado">
                
                <div class="titulo">
                    <h1 style="margin-top: -240px; color: blue;">CEP Fontaine</h1>
                </div>
                <input class="escrever" type="text" id="nro">
                <br>
                <button onclick="buscaCEP()" id="Buscar">Buscar</button>
            </div>
        </div>

        <div class="coluna3">
            <footer class="footer">
                <div class="product-item" style="margin-top: -30px;">
                    <p id="Rua" style="font-weight: bold; color: black;">RUA: <h4 class="info" id="rua"></h4></p>
                    <p id="Bairro" style="font-weight: bold; color: black;">BAIRRO: <h4 class="info" id="bairro" style="margin-left: 105px;"></h4></p>
                    <p id="Cidade" style="font-weight: bold; color: black;">CIDADE: <h4 class="info" id="cidade" style="margin-left: 105px;"></h4></p>
                    <p id="Estado" style="font-weight: bold; color: black;">ESTADO: <h4 class="info" id="uf" style="margin-left: 105px;"></h4></p>
                </div>

                <div class="waves">
                    <div class="wave" id="wave1"></div>
                    <div class="wave" id="wave2"></div>
                    <div class="wave" id="wave3"></div>
                    <div class="wave" id="wave4"></div>
                </div>
            </footer>
        </div>
    </div>
    
    <br>

</body>
</html>
