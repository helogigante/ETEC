<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/funcao.js"></script>

</head>
<body>

    <br>

    <div class="row">

            <br>

            <h3>Peso: <input class="escrever" type="text" id="peso" style="margin-left: 32px; width: 40%;"></h3>
            <button onclick="calcular()">Calcular</button>
            <br>
            <br>
            <br>
            <div class="mostrar" style="text-align: center;"><h4 id="visor"></h4></div>
            <br>
        </div>

    </div>
    
    <br>
